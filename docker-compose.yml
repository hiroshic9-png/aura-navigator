# AURA MVP — ローカル開発用 Docker Compose
services:
  app:
    build: .
    ports:
      - "8400:8400"
    volumes:
      - ./data:/data
      - ./.env:/app/.env:ro
    environment:
      - AURA_DATABASE_URL=sqlite+aiosqlite:///data/aura.db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8400/api/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
